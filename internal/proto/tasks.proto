syntax = "proto3";

package elpulpo.tasks.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/sbogutyn/el-pulpo-ai/internal/proto;tasksv1";

// TaskService is the wire contract between the mastermind server and worker
// clients. When removing a field in a future revision, always add a `reserved`
// statement to prevent field-number reuse.
service TaskService {
  // ClaimTask atomically assigns the next eligible task to the calling worker
  // and marks it as claimed. Returns gRPC NOT_FOUND when the queue is empty;
  // clients should treat NOT_FOUND as a benign "try again later" signal, not a
  // real failure to log.
  rpc ClaimTask(ClaimTaskRequest) returns (ClaimTaskResponse);

  // Heartbeat renews the caller's lease on a previously claimed task. The
  // first heartbeat transitions the task from `claimed` to `running`;
  // subsequent heartbeats refresh its last-seen timestamp. Returns
  // FAILED_PRECONDITION when the caller no longer owns the claim.
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // ReportResult finalizes a task the caller owns. A success marks the task
  // `completed`; a failure either retries with linear backoff or transitions
  // the task to `failed` once `max_attempts` is exhausted. Returns
  // FAILED_PRECONDITION when the caller no longer owns the claim.
  rpc ReportResult(ReportResultRequest) returns (ReportResultResponse);

  // UpdateProgress attaches a free-form progress note to a task the caller
  // owns and refreshes its lease (same effect as Heartbeat). The note is
  // overwritten on each call and surfaced in the admin UI so operators can
  // see what a long-running worker is doing. Returns FAILED_PRECONDITION
  // when the caller no longer owns the claim.
  rpc UpdateProgress(UpdateProgressRequest) returns (UpdateProgressResponse);

  // AppendLog adds a single immutable log line to the task's append-only
  // log and refreshes the caller's lease. Unlike UpdateProgress (which
  // overwrites a single "current status" note), AppendLog is used to
  // record a narrative trail of what the worker did. Returns
  // FAILED_PRECONDITION when the caller no longer owns the claim.
  rpc AppendLog(AppendLogRequest) returns (AppendLogResponse);
}

// Task is the unit of work handed from mastermind to a worker.
message Task {
  // Identifier assigned by mastermind. Matches the `id` column of the
  // mastermind tasks table (UUID v4 serialized canonical 8-4-4-4-12).
  string id = 1;

  // Logical task type. Workers dispatch on this string to decide which
  // handler to run.
  string name = 2;

  // Opaque, caller-defined JSON payload. Mastermind stores this verbatim and
  // does not interpret it.
  bytes payload = 3;
}

// ClaimTaskRequest asks mastermind for the next available task.
message ClaimTaskRequest {
  // Stable identifier for the calling worker, typically "<hostname>-<pid>" or
  // a UUID chosen at process start. Mastermind records this on the claim for
  // debugging and poison-pill attribution.
  string worker_id = 1;
}

// ClaimTaskResponse carries a claimed task. On empty-queue the server returns
// NOT_FOUND instead of an empty response, so `task` is guaranteed non-nil on
// success.
message ClaimTaskResponse {
  Task task = 1;
}

// HeartbeatRequest refreshes the caller's lease on an owned task.
message HeartbeatRequest {
  string worker_id = 1;
  string task_id = 2;
}

message HeartbeatResponse {}

// ReportResultRequest finalizes a task with either success or failure.
// `outcome` is a oneof so that "neither set" and "both set" are unrepresentable
// on the wire.
message ReportResultRequest {
  string worker_id = 1;
  string task_id = 2;

  oneof outcome {
    Success success = 3;
    Failure failure = 4;
  }

  // Success signals the task completed. Empty today, but kept as a message
  // (not a bare flag) so fields like output summary or timing can be added
  // without a breaking change.
  message Success {}

  // Failure signals the task did not complete. `message` is surfaced as
  // `last_error` in the mastermind tasks table and included in retry
  // bookkeeping.
  message Failure {
    string message = 1;
  }
}

message ReportResultResponse {}

// UpdateProgressRequest records a free-form progress note. An empty `note`
// clears any previously stored note on the task.
message UpdateProgressRequest {
  string worker_id = 1;
  string task_id = 2;
  string note = 3;
}

message UpdateProgressResponse {}

// AppendLogRequest appends one line to the task's immutable log.
message AppendLogRequest {
  string worker_id = 1;
  string task_id   = 2;
  string message   = 3;
}

message AppendLogResponse {
  // id of the freshly inserted log row; useful for tests and downstream
  // correlation.
  int64 id = 1;
}

// TaskLogEntry mirrors one row of the `task_logs` table.
message TaskLogEntry {
  int64  id                              = 1;
  string task_id                         = 2;
  string message                         = 3;
  google.protobuf.Timestamp created_at   = 4;
}

// AdminService is the administrative surface of mastermind. It is consumed by
// the mastermind-mcp binary (on behalf of a coding agent), the elpulpo CLI,
// and any future admin tooling. Authentication uses ADMIN_TOKEN, enforced by
// the server's per-method bearer interceptor.
service AdminService {
  // CreateTask inserts a new task in `pending` state and returns it.
  rpc CreateTask(CreateTaskRequest) returns (CreateTaskResponse);

  // GetTask returns one task by id. NOT_FOUND when the id is unknown.
  rpc GetTask(GetTaskRequest) returns (GetTaskResponse);

  // ListTasks returns a page of tasks, optionally filtered by status.
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse);

  // ListTaskLogs returns the append-only log lines recorded for a task
  // (oldest first, capped by `limit`). NOT_FOUND when the id is unknown.
  rpc ListTaskLogs(ListTaskLogsRequest) returns (ListTaskLogsResponse);

  // CancelTask removes a task. Only allowed when the task is pending,
  // completed, or failed; returns FAILED_PRECONDITION while it is active
  // (claimed or running) because an operator cannot safely unilaterally
  // abandon work that a worker still holds. NOT_FOUND when id is unknown.
  rpc CancelTask(CancelTaskRequest) returns (CancelTaskResponse);

  // RetryTask resets a task back to `pending` with attempt_count=0, clearing
  // claim state and any previous failure. Allowed from pending, completed,
  // or failed. Returns FAILED_PRECONDITION while the task is claimed or
  // running.
  rpc RetryTask(RetryTaskRequest) returns (RetryTaskResponse);

  // ListWorkers returns the distinct worker identities mastermind has seen
  // claim work, alongside lightweight status per worker (how many tasks they
  // currently hold and when they last sent a heartbeat). Derived purely from
  // the tasks table — mastermind does not maintain a separate workers table.
  rpc ListWorkers(ListWorkersRequest) returns (ListWorkersResponse);
}

// TaskDetail mirrors the mastermind `tasks` row. Nullable columns become empty
// strings or zero timestamps on the wire; the MCP adapter omits them when
// serializing to JSON.
message TaskDetail {
  string id                                      = 1;
  string name                                    = 2;
  bytes  payload                                 = 3;
  int32  priority                                = 4;
  string status                                  = 5;
  google.protobuf.Timestamp scheduled_for        = 6;
  int32  attempt_count                           = 7;
  int32  max_attempts                            = 8;
  string claimed_by                              = 9;
  google.protobuf.Timestamp claimed_at           = 10;
  google.protobuf.Timestamp last_heartbeat_at    = 11;
  google.protobuf.Timestamp completed_at         = 12;
  string last_error                              = 13;
  string jira_url                                = 14;
  string github_pr_url                           = 15;
  google.protobuf.Timestamp created_at           = 16;
  google.protobuf.Timestamp updated_at           = 17;
}

message CreateTaskRequest {
  string name                                    = 1;
  bytes  payload                                 = 2;
  int32  priority                                = 3;
  int32  max_attempts                            = 4;
  google.protobuf.Timestamp scheduled_for        = 5;
  string jira_url                                = 6;
  string github_pr_url                           = 7;
}
message CreateTaskResponse { TaskDetail task = 1; }

message GetTaskRequest  { string id = 1; }
message GetTaskResponse { TaskDetail task = 1; }

message ListTasksRequest {
  string status = 1;
  int32  limit  = 2;
  int32  offset = 3;
}
message ListTasksResponse {
  repeated TaskDetail items = 1;
  int32             total   = 2;
}

message ListTaskLogsRequest {
  string id    = 1;
  int32  limit = 2;
}

message ListTaskLogsResponse {
  repeated TaskLogEntry items = 1;
}

message CancelTaskRequest  { string id = 1; }
message CancelTaskResponse {}

message RetryTaskRequest  { string id = 1; }
message RetryTaskResponse { TaskDetail task = 1; }

// WorkerInfo describes one distinct worker identity that has at some point
// claimed a task. All fields are derived from aggregations over the tasks
// table: mastermind does not persist a separate worker registry.
message WorkerInfo {
  // claimed_by value used by this worker.
  string id = 1;

  // Number of tasks currently in `claimed` or `running` state that are
  // owned by this worker.
  int32 active_tasks = 2;

  // Most recent heartbeat (or claim time, if the worker never heartbeated)
  // across any task this worker has owned. Zero when the worker is only
  // known from historical, already-completed tasks.
  google.protobuf.Timestamp last_seen_at = 3;

  // Lifetime count of tasks this worker has completed successfully.
  int32 completed_tasks = 4;

  // Lifetime count of tasks this worker claimed that ended in `failed`.
  int32 failed_tasks = 5;
}

message ListWorkersRequest {}

message ListWorkersResponse {
  repeated WorkerInfo items = 1;
}
