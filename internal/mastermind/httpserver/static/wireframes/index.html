<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Task Queue · Wireframes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Kalam:wght@300;400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="wireframes.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #e9e6dd; }
    body { font-family: 'Kalam', cursive; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="wireframes.jsx"></script>
  <script type="text/babel" src="wf1.jsx"></script>
  <script type="text/babel" src="wf2.jsx"></script>
  <script type="text/babel" src="wf3.jsx"></script>
  <script type="text/babel" src="wf4.jsx"></script>
  <script type="text/babel" src="wf5.jsx"></script>

  <script type="text/babel" data-presets="react">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "showLogs": true,
      "sketchy": true
    }/*EDITMODE-END*/;

    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const showLogs = tweaks.showLogs;

      // Toggle "sketchy" → swap fonts off (cleaner sans) when off
      React.useEffect(() => {
        document.documentElement.style.setProperty(
          '--wf-font-display',
          tweaks.sketchy ? "'Caveat', cursive" : "'Helvetica Neue', Helvetica, Arial, sans-serif"
        );
        const root = document.documentElement;
        if (!tweaks.sketchy) {
          root.style.setProperty('--ink', '#222');
          document.body.dataset.sketchy = 'off';
        } else {
          root.style.removeProperty('--ink');
          delete document.body.dataset.sketchy;
        }
      }, [tweaks.sketchy]);

      const W = 1280, H = 800;

      return (
        <>
          <DesignCanvas title="Task Queue · Wireframe Exploration" subtitle="5 directions for an AI agent task-queue manager view. Self-serve claim model · small scale (≤10 agents).">
            <DCSection id="dashboards" title="Direction A · Dashboards">
              <DCArtboard id="wf1" label="01 · Three-pane (queue | agents | logs)" width={W} height={H}>
                <Wireframe1 showLogs={showLogs} />
              </DCArtboard>
              <DCArtboard id="wf2" label="02 · Queue-first w/ agent strip" width={W} height={H}>
                <Wireframe2 showLogs={showLogs} />
              </DCArtboard>
            </DCSection>

            <DCSection id="agent-first" title="Direction B · Agent-centric">
              <DCArtboard id="wf3" label="03 · Agent cards w/ inline activity" width={W} height={H}>
                <Wireframe3 showLogs={showLogs} />
              </DCArtboard>
            </DCSection>

            <DCSection id="flow" title="Direction C · Flow-centric">
              <DCArtboard id="wf4" label="04 · Timeline / log-centric" width={W} height={H}>
                <Wireframe4 showLogs={showLogs} />
              </DCArtboard>
              <DCArtboard id="wf5" label="05 · Kanban (Queue → Doing → Done)" width={W} height={H}>
                <Wireframe5 showLogs={showLogs} />
              </DCArtboard>
            </DCSection>
          </DesignCanvas>

          <TweaksPanel title="Tweaks">
            <TweakSection title="Panels">
              <TweakToggle
                label="Show logs panel"
                hint="Hide to see how the layouts breathe without the log rail."
                value={tweaks.showLogs}
                onChange={v => setTweak('showLogs', v)}
              />
            </TweakSection>
            <TweakSection title="Style">
              <TweakToggle
                label="Sketchy mode"
                hint="Off = cleaner sans-serif (preview)."
                value={tweaks.sketchy}
                onChange={v => setTweak('sketchy', v)}
              />
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
