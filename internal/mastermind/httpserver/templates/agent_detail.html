{{ define "agent_detail" }}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Detail.Info.ID }} — agent — mastermind</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Kalam:wght@300;400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/dashboard.css">
  <script src="/static/htmx.min.js" defer></script>
</head>
<body>
  <header class="bar">
    <span class="crumb">⌗ task queue</span>
    <span class="spacer"></span>
    <a class="tab" href="/tasks">Tasks</a>
    <a class="tab" href="/tasks/new">New</a>
    <a class="tab on" href="/dashboard">Dashboard</a>
    <a class="tab" href="/wireframes">Wireframes</a>
    <span class="live"><span class="pulse"></span>live · 3s</span>
  </header>

  <main class="detail"
        id="agent-shell"
        hx-get="/dashboard/agents/{{ urlEscape .Detail.Info.ID }}/fragment"
        hx-trigger="every 3s"
        hx-swap="innerHTML">
    {{ template "agent_detail_fragment" . }}
  </main>

  <script>
    // Auto-scroll the log pane to the bottom on initial load and after every
    // HTMX poll, so newest lines stay in view (terminal-style). Only
    // auto-scrolls when the user is already near the bottom — otherwise we
    // assume they're reading history and leave their position alone.
    function pinLogsToBottom(stickyThreshold) {
      const el = document.getElementById('logs-scroll');
      if (!el) return;
      const stuck = (el.scrollHeight - el.scrollTop - el.clientHeight) < stickyThreshold;
      if (stuck) el.scrollTop = el.scrollHeight;
    }
    document.addEventListener('DOMContentLoaded', () => pinLogsToBottom(1e9));
    document.body.addEventListener('htmx:afterSwap', () => pinLogsToBottom(80));
  </script>
</body>
</html>
{{ end }}
