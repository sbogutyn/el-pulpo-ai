{{ define "dashboard" }}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard — mastermind</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Kalam:wght@300;400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/dashboard.css">
  <script src="/static/htmx.min.js" defer></script>
</head>
<body>
  <header class="bar">
    <span class="crumb">⌗ task queue</span>
    <span class="spacer"></span>
    <a class="tab" href="/tasks">Tasks</a>
    <a class="tab" href="/tasks/new">New</a>
    <a class="tab on" href="/dashboard">Dashboard</a>
    <a class="tab" href="/wireframes">Wireframes</a>
    <span class="live"><span class="pulse"></span>live · 3s</span>
  </header>

  <main class="shell"
        id="dash-shell"
        hx-get="/dashboard/fragment"
        hx-trigger="every 3s"
        hx-swap="innerHTML">
    {{ template "dashboard_fragment" . }}
  </main>
</body>
</html>
{{ end }}
